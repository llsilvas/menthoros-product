schema: spec-driven

# Contexto mostrado à IA ao criar artefatos (constraint, não vai pro arquivo).
context: |
  Stack: backend Java 21 / Spring Boot 3.5 (apps/menthoros-backend); frontend React 19 / Vite / MUI
  (apps/menthoros-front). PostgreSQL + Flyway; Keycloak multi-tenant via TenantContext.
  Conventional Commits em PT-BR. As regras canônicas de código vivem nos CLAUDE.md de cada repo e na raiz.

  Produto — estrela-guia: o Menthoros existe para OTIMIZAR A ROTINA DO TREINADOR (coach). Persona primária
  é o treinador; o atleta é secundário. Coach-in-the-loop: a IA propõe, o treinador aprova/edita/rejeita —
  nunca automatizar o treinador para fora do circuito nem expor saída de IA ao atleta sem ação dele.
  Toda feature deve melhorar a rotina/decisão do treinador (tempo economizado, decisão melhor, mais atletas atendidos).

  Toda change declara Tamanho (XS/S/M/L/XL) e Trilha:
  - XS/S  -> Fast track (sem design.md formal; QA = /review + testes)
  - M/L/XL -> Full track (com design.md + pre-mortem the-fool; QA = code-reviewer + security-reviewer + test-master)
  Suba para Full se a change: tocar mais de um repo; mudar contrato de API ou schema de banco;
  tiver incerteza de design; ou tiver risco de segurança/multi-tenancy. Na dúvida, suba.

# Regras por artefato (constraints para a IA ao gerar cada um).
rules:
  proposal:
    - "Comece o proposal com a linha de classificação: **Tamanho:** <XS|S|M|L|XL> · **Trilha:** <Fast|Full>, escolhida pelos critérios do contexto acima."
    - "Mantenha o escopo mínimo e dentro da change; sem feature creep."
    - "Inclua **Critérios de aceite** testáveis (Given/When/Then ou EARS) — cada critério verificável por um teste."
    - "Inclua a seção **Open Questions & Assumptions** com as premissas assumidas e o que ainda está em aberto."
    - "Declare a **Métrica de sucesso** mensurável, ligada à rotina do treinador (ex.: minutos por revisão, % de propostas aceitas)."
  tasks:
    - "Tasks granulares e numeradas (N.M), cada bloco com passo de validação explícito (backend: ./mvnw clean test; frontend: npm run lint && npm run build)."
