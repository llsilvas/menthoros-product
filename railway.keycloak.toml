# railway.keycloak.toml — Configuração de deploy do Keycloak
# Para usar: railway up -c menthoros-product/railway.keycloak.toml

[build]
builder = "dockerfile"
dockerfilePath = "infra/docker/Dockerfile.keycloak"
context = "."

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
